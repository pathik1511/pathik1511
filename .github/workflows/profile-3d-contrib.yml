# Place this file at: .github/workflows/profile-3d-contrib.yml
# Generates a 3D isometric contribution graph SVG and commits it to the repo.
# Output files land in ./profile-3d-contrib/ (several color themes, including
# animated ones like profile-night-rainbow.svg and profile-green-animate.svg).

name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "chore: update 3D contribution graph" || echo "No changes to commit"
          git push
