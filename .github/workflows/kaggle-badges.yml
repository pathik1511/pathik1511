# Place this file at: .github/workflows/kaggle-badges.yml
# Generates SVG badges showing your CURRENT Kaggle ranks and commits them to the repo.

name: Kaggle Badges

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *" # daily at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome@131.0.6778.85

      - name: Generate Kaggle badges
        uses: takayoshi-makabe/kaggle-badges@v1.4.0
        with:
          user_name: pathik1511

      - name: Commit and push SVG files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d ./kaggle-badges ] || [ -d ./kaggle-plates ]; then
            git add ./kaggle-badges ./kaggle-plates 2>/dev/null || true
            git commit -m "chore: update Kaggle rank badges" || echo "No changes to commit"
            git push
          else
            echo "::error::No badge files were generated - check that the Kaggle username is correct and has ranked categories"
            exit 1
          fi
